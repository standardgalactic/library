<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audio Scope</title>

<style>

body{
margin:0;
background:#000;
color:#7cff7c;
font-family:monospace;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding:20px;
}

/* ===== porthole ===== */

.scope-wrap{
position:relative;
width:360px;
height:360px;
margin-bottom:20px;
}

.scope-wrap::before{
content:"";
position:absolute;
inset:0;
border-radius:50%;
background:
radial-gradient(circle at 50% 50%, #003300 60%, #001100 70%, #000 100%);
box-shadow:
0 0 0 4px #001a00,
0 0 20px #00ff0030,
inset 0 0 40px #00ff0020;
}

canvas{
position:absolute;
inset:20px;
width:320px;
height:320px;
border-radius:50%;
background:#000;
box-shadow:inset 0 0 20px #00ff0020;
}

.scanlines{
position:absolute;
inset:20px;
border-radius:50%;
background:
repeating-linear-gradient(
to bottom,
rgba(0,255,0,0.05) 0px,
rgba(0,255,0,0.05) 1px,
transparent 2px,
transparent 4px
);
pointer-events:none;
}

/* ===== controls ===== */

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:12px;
}

button, select, input{
background:#001400;
border:1px solid #00ff00;
color:#7cff7c;
padding:8px 14px;
font-size:.8em;
cursor:pointer;
}

.timer{
min-width:80px;
font-size:1.1em;
}

.captions{
max-width:720px;
min-height:2.4em;
border:1px solid #00ff0030;
background:#001000;
padding:10px;
margin-top:10px;
}

label{
display:flex;
align-items:center;
gap:6px;
font-size:.8em;
}

</style>
</head>

<body>

<h2 id="title">Why AI Code and Essays Fail</h2>

<div class="scope-wrap">
<canvas id="scope"></canvas>
<div class="scanlines"></div>
</div>

<div class="controls">

<button id="toggle">Play</button>

<label>
Track
<select id="track">
<option value="0">Why AI Code and Essays Fail</option>
<option value="1">The Mathematics of Hollow AI Writing</option>
</select>
</label>

<label>
Speed
<select id="speed">
<option value="0.75">0.75×</option>
<option value="0.85">0.85×</option>
<option value="0.95" selected>0.95×</option>
<option value="1">1×</option>
<option value="1.1">1.1×</option>
</select>
</label>

<label>
Pitch
<input id="pitch" type="range" min="-400" max="400" value="-100">
</label>

<button id="loop">Loop Off</button>

<div class="timer" id="timer">--:--</div>

</div>

<div id="captions" class="captions"></div>

<audio id="audio">
<source id="audiosrc" src="Why_AI_code_and_essays_fail.mp3" type="audio/mpeg">
<track id="tracksrc" kind="captions" src="Why_AI_code_and_essays_fail.vtt" default>
</audio>

<script>

/* ===== track data ===== */

const tracks = [
{
title: "Why AI Code and Essays Fail",
audio: "Why_AI_code_and_essays_fail.mp3",
vtt: "Why_AI_code_and_essays_fail.vtt"
},
{
title: "The Mathematics of Hollow AI Writing",
audio: "The-mathematics-of-hollow-AI-writing.mp3",
vtt: "The-mathematics-of-hollow-AI-writing.vtt"
}
]

/* ===== elements ===== */

const audio = document.getElementById("audio")
const captions = document.getElementById("captions")
const toggle = document.getElementById("toggle")
const loop = document.getElementById("loop")
const timer = document.getElementById("timer")
const speed = document.getElementById("speed")
const pitch = document.getElementById("pitch")
const trackSelect = document.getElementById("track")
const audioSrc = document.getElementById("audiosrc")
const trackSrc = document.getElementById("tracksrc")
const title = document.getElementById("title")

/* ===== audio engine ===== */

let audioCtx, analyser, buffer

function initAudio(){

if(audioCtx) return

audioCtx = new (window.AudioContext||window.webkitAudioContext)()

analyser = audioCtx.createAnalyser()
analyser.fftSize = 2048

const src = audioCtx.createMediaElementSource(audio)

src.connect(analyser)
analyser.connect(audioCtx.destination)

buffer = new Uint8Array(analyser.fftSize)

audio.preservesPitch = false
audio.mozPreservesPitch = false
audio.webkitPreservesPitch = false

}

/* ===== captions ===== */

function attachTrack(){

const textTrack = audio.textTracks[0]
if(!textTrack) return

textTrack.mode = "hidden"

textTrack.oncuechange = ()=>{
const cue = textTrack.activeCues[0]
captions.textContent = cue ? cue.text : ""
}

}

/* ===== track switching ===== */

function loadTrack(i){

const t = tracks[i]

audio.pause()
toggle.textContent = "Play"

audioSrc.src = t.audio
trackSrc.src = t.vtt
title.textContent = t.title

audio.load()
captions.textContent = ""

audio.addEventListener("loadedmetadata", ()=>{
attachTrack()
}, { once:true })

}

trackSelect.onchange = ()=>{
loadTrack(trackSelect.value)
}

/* ===== playback ===== */

function updatePlayback(){
const baseSpeed = parseFloat(speed.value)
const cents = parseFloat(pitch.value)
const pitchFactor = Math.pow(2, cents / 1200)
audio.playbackRate = baseSpeed * pitchFactor
}

toggle.onclick = ()=>{

initAudio()

if(audio.paused){
audioCtx.resume().then(()=>audio.play())
toggle.textContent = "Pause"
}else{
audio.pause()
toggle.textContent = "Play"
}

}

loop.onclick = ()=>{
audio.loop = !audio.loop
loop.textContent = audio.loop ? "Loop On" : "Loop Off"
}

speed.onchange = updatePlayback
pitch.oninput = updatePlayback

/* ===== timer ===== */

function fmt(t){
const m=Math.floor(t/60)
const s=Math.floor(t%60)
return`${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`
}

function updateTimer(){
if(audio.duration) timer.textContent = fmt(audio.duration - audio.currentTime)
requestAnimationFrame(updateTimer)
}
updateTimer()

/* ===== canvas ===== */

const canvas = document.getElementById("scope")
const ctx = canvas.getContext("2d")

const dpr = window.devicePixelRatio || 1
canvas.width = 320 * dpr
canvas.height = 320 * dpr
ctx.setTransform(dpr,0,0,dpr,0,0)

/* ===== entropy ===== */

function entropy(buf){
let m=0
for(let i=0;i<buf.length;i++) m+=buf[i]
m/=buf.length
let v=0
for(let i=0;i<buf.length;i++){
let d=buf[i]-m
v+=d*d
}
return v/buf.length
}

/* ===== draw ===== */

let phase=0
let eSmooth=0

function draw(){

if(analyser){

analyser.getByteTimeDomainData(buffer)

const e = entropy(buffer)
eSmooth += (e - eSmooth)*0.05
const en = Math.min(eSmooth/5000,1)

ctx.fillStyle="rgba(0,0,0,0.15)"
ctx.fillRect(0,0,320,320)

ctx.beginPath()

for(let i=0;i<buffer.length;i++){

const t=i/buffer.length*2*Math.PI
const a=(buffer[i]-128)/128

const x=Math.sin(3*t+phase)*a*130
const y=Math.sin(4*t)*a*130

const px=160+x
const py=160+y

if(i===0) ctx.moveTo(px,py)
else ctx.lineTo(px,py)

}

ctx.strokeStyle="#00ff88"
ctx.lineWidth=1.5
ctx.shadowColor="#00ff88"
ctx.shadowBlur=10
ctx.stroke()
ctx.shadowBlur=0

phase+=0.01+en*0.03

}

requestAnimationFrame(draw)

}

draw()

/* ===== error ===== */

audio.addEventListener("error",()=>{
timer.textContent="ERR"
captions.textContent="Audio failed to load."
})

audio.addEventListener("ended", ()=>{

let i = parseInt(trackSelect.value)

/* move to next track */
i = (i + 1) % tracks.length

trackSelect.value = i
loadTrack(i)

/* autoplay next */
audio.play().then(()=>{
toggle.textContent = "Pause"
})

})

</script>

</body>
</html>
